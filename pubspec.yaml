name: pure_editor
description: "pureEditor - 纯本地沉浸式写作APP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_quill: ^11.5.0
  path_provider: ^2.1.1
  uuid: ^4.2.1
  share_plus: ^10.0.0
  file_picker: ^10.0.0
  local_auth: ^2.1.8
  flutter_animate: ^4.3.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
